<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#FFFFFF"/>
  <!-- Desk -->
  <rect x="200" y="400" width="800" height="20" fill="#2D2D2D"/>
  <!-- Laptop base -->
  <rect x="400" y="380" width="400" height="20" fill="#4A4A4A"/>
  <!-- Laptop screen -->
  <rect x="420" y="250" width="360" height="240" fill="#1A1A1A" stroke="#D9775A" stroke-width="3"/>
  <!-- Claude interface on screen -->
  <rect x="450" y="280" width="300" height="150" fill="#FFFFFF"/>
  <circle cx="600" cy="340" r="30" fill="#D9775A"/>
  <rect x="470" y="390" width="260" height="6" rx="3" fill="#D9775A" opacity="0.5"/>
  <rect x="470" y="405" width="200" height="6" rx="3" fill="#D9775A" opacity="0.3"/>
  <!-- Person silhouette -->
  <circle cx="250" cy="320" r="40" fill="#D9775A"/>
  <rect x="220" y="370" width="60" height="80" rx="10" fill="#D9775A"/>
  <!-- Items on desk -->
  <rect x="850" y="360" width="40" height="50" fill="#CC785C"/>
  <circle cx="920" cy="385" r="20" fill="#CC785C" opacity="0.6"/>
  <!-- Plant -->
  <rect x="280" y="340" width="30" height="60" fill="#CC785C"/>
  <ellipse cx="295" cy="330" rx="25" ry="15" fill="#CC785C"/>
</svg>
