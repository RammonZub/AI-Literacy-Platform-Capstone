<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#FFFFFF"/>
  <!-- Layer 1 - Data panel -->
  <rect x="150" y="150" width="280" height="200" rx="10" fill="#F5F5F5" stroke="#D9775A" stroke-width="3"/>
  <rect x="180" y="180" width="220" height="8" rx="4" fill="#D9775A"/>
  <rect x="180" y="200" width="180" height="6" rx="3" fill="#CC785C" opacity="0.5"/>
  <rect x="180" y="215" width="200" height="6" rx="3" fill="#CC785C" opacity="0.5"/>
  <!-- Code visualization -->
  <rect x="180" y="240" width="60" height="6" rx="3" fill="#10A37F"/>
  <rect x="250" y="240" width="80" height="6" rx="3" fill="#D9775A"/>
  <rect x="180" y="255" width="100" height="6" rx="3" fill="#D9775A"/>
  <rect x="180" y="270" width="140" height="6" rx="3" fill="#CC785C" opacity="0.5"/>
  <!-- Layer 2 - Analysis panel (offset) -->
  <rect x="470" y="200" width="280" height="200" rx="10" fill="#F5F5F5" stroke="#CC785C" stroke-width="3"/>
  <circle cx="540" cy="260" r="30" fill="none" stroke="#D9775A" stroke-width="3"/>
  <rect x="590" y="250" width="140" height="8" rx="4" fill="#D9775A"/>
  <rect x="590" y="270" width="100" height="6" rx="3" fill="#CC785C" opacity="0.5"/>
  <rect x="590" y="285" width="120" height="6" rx="3" fill="#CC785C" opacity="0.5"/>
  <!-- Data viz elements -->
  <rect x="500" y="320" width="20" height="40" fill="#D9775A"/>
  <rect x="530" y="300" width="20" height="60" fill="#CC785C"/>
  <rect x="560" y="310" width="20" height="50" fill="#D9775A"/>
  <rect x="590" y="290" width="20" height="70" fill="#CC785C"/>
  <!-- Layer 3 - Features panel (offset) -->
  <rect x="790" y="250" width="280" height="200" rx="10" fill="#F5F5F5" stroke="#D9775A" stroke-width="3"/>
  <rect x="820" y="280" width="220" height="8" rx="4" fill="#D9775A"/>
  <rect x="820" y="300" width="180" height="6" rx="3" fill="#CC785C" opacity="0.5"/>
  <rect x="820" y="315" width="200" height="6" rx="3" fill="#CC785C" opacity="0.5"/>
  <!-- Feature icons -->
  <circle cx="850" cy="360" r="15" fill="#D9775A"/>
  <circle cx="900" cy="360" r="15" fill="#CC785C"/>
  <circle cx="950" cy="360" r="15" fill="#D9775A"/>
  <!-- Connection lines -->
  <line x1="430" y1="250" x2="470" y2="300" stroke="#D9775A" stroke-width="2" opacity="0.5"/>
  <line x1="750" y1="300" x2="790" y2="350" stroke="#D9775A" stroke-width="2" opacity="0.5"/>
  <line x1="430" y1="300" x2="790" y2="300" stroke="#CC785C" stroke-width="2" opacity="0.3" stroke-dasharray="10,5"/>
</svg>
